services:
  - type: web
    name: resume-parser-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: skill_assessment
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: resume-parser-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm install -g serve && serve -s dist -l 3000
    envVars:
      - key: VITE_API_BASE_URL
        value: https://resume-parser-backend.onrender.com/api
